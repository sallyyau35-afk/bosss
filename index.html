<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boss Battle - CD Edition</title>
    <style>
        * { touch-action: manipulation; box-sizing: border-box; }
        
        body { 
            background: #000; margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw;
            font-family: sans-serif; overflow: hidden; color: white;
        }

        /* 血條區 */
        .header {
            height: 12%; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #111; border-bottom: 1px solid #333;
        }

        .hp-bar-bg {
            width: 85%; height: 18px;
            background: #333; border-radius: 9px; overflow: hidden;
            border: 1.5px solid #666;
        }

        #hp-fill {
            width: 100%; height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            transition: width 0.2s ease;
        }

        /* 遊戲舞台 */
        #game-stage {
            flex: 1; position: relative;
            width: 100%; background: #1a1a1a;
            overflow: hidden;
        }

        #boss {
            position: absolute;
            width: 80px; height: 80px;
            background-image: url('boss.png'); /* 記得換成你的相片 */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            top: 20%; left: calc(50% - 40px);
            transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
        }

        .missile {
            position: absolute; width: 20px; height: 30px;
            background-image: url('missile.png'); /* 記得換成你的相片 */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            bottom: 0;
        }

        /* 軌跡動畫 */
        .type-normal { animation: shoot-up 0.5s linear forwards; }
        .type-slow { animation: shoot-up 1.0s linear forwards; }
        .type-s-curve { animation: s-move 0.7s linear forwards; }
        .type-diagonal { animation: diagonal-up 0.6s linear forwards; }
        .type-spin { animation: spin-move 0.8s linear forwards; }

        @keyframes shoot-up { to { transform: translateY(-120vh); } }
        @keyframes s-move {
            0% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-40vh) translateX(-60px); }
            100% { transform: translateY(-120vh) translateX(0); }
        }
        @keyframes diagonal-up { to { transform: translateY(-120vh) translateX(150px); } }
        @keyframes spin-move { to { transform: translateY(-120vh) rotate(1080deg) translateX(40px); } }

        /* 按鈕區 */
        .controller {
            height: 18%; width: 100%;
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 5px; padding: 10px;
            background: #222; border-top: 1px solid #444;
        }

        .fire-btn {
            position: relative; /* 為了放 CD 遮罩 */
            border: none; border-radius: 12px;
            background: #3d3d3d; color: white;
            font-size: 24px; display: flex;
            align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* 冷卻中的按鈕樣式 */
        .fire-btn.cd-active {
            pointer-events: none; /* 冷卻中不能點擊 */
            background: #222;
            opacity: 0.6;
        }

        /* 冷卻進度遮罩 */
        .cd-overlay {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 0%;
            background: rgba(255, 255, 255, 0.2);
            transition: height linear;
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 12px; color: #ff4757; margin-bottom: 4px; font-weight: bold;">BOSS HP</div>
        <div class="hp-bar-bg"><div id="hp-fill"></div></div>
    </div>

    <div id="game-stage"><div id="boss"></div></div>

    <div class="controller">
        <button class="fire-btn" onclick="shoot(event, 'normal', 400)">🚀<div class="cd-overlay"></div></button>
        <button class="fire-btn" onclick="shoot(event, 'slow', 1200)">🐢<div class="cd-overlay"></div></button>
        <button class="fire-btn" onclick="shoot(event, 's-curve', 2000)">🐍<div class="cd-overlay"></div></button>
        <button class="fire-btn" onclick="shoot(event, 'diagonal', 800)">↗️<div class="cd-overlay"></div></button>
        <button class="fire-btn" onclick="shoot(event, 'spin', 1500)">🌀<div class="cd-overlay"></div></button>
    </div>

    <script>
        let bossHP = 100;
        const boss = document.getElementById('boss');
        const hpFill = document.getElementById('hp-fill');
        const stage = document.getElementById('game-stage');

        function moveBoss() {
            if (bossHP <= 0) return;
            const maxX = stage.clientWidth - boss.clientWidth;
            boss.style.left = Math.floor(Math.random() * maxX) + 'px';
            setTimeout(moveBoss, 600 + (bossHP * 4));
        }
        moveBoss();

        function shoot(e, type, cdTime) {
            const btn = e.currentTarget;
            
            // 如果正在冷卻中或 Boss 死了，就跳出
            if (btn.classList.contains('cd-active') || bossHP <= 0) return;

            // 1. 處理冷卻邏輯
            btn.classList.add('cd-active');
            const overlay = btn.querySelector('.cd-overlay');
            
            // 重設遮罩高度
            overlay.style.transition = 'none';
            overlay.style.height = '100%';
            
            // 啟動冷卻動畫
            setTimeout(() => {
                overlay.style.transition = `height ${cdTime}ms linear`;
                overlay.style.height = '0%';
            }, 10);

            // 冷卻結束後移除狀態
            setTimeout(() => {
                btn.classList.remove('cd-active');
            }, cdTime);

            // 2. 發射導彈邏輯
            const btnRect = btn.getBoundingClientRect();
            const stageRect = stage.getBoundingClientRect();
            const relativeX = (btnRect.left + btnRect.width / 2) - stageRect.left;

            const missile = document.createElement('div');
            missile.className = `missile type-${type}`;
            missile.style.left = (relativeX - 10) + 'px';
            stage.appendChild(missile);

            const checkHit = setInterval(() => {
                const bRect = boss.getBoundingClientRect();
                const mRect = missile.getBoundingClientRect();

                if (mRect.left < bRect.right && mRect.right > bRect.left &&
                    mRect.top < bRect.bottom && mRect.bottom > bRect.top) {
                    
                    // 根據導彈類型決定扣血量 (隨你調整)
                    let dmg = 5;
                    if (type === 's-curve') dmg = 15;
                    if (type === 'slow') dmg = 10;

                    bossHP -= dmg;
                    if (bossHP < 0) bossHP = 0;
                    hpFill.style.width = bossHP + '%';
                    
                    boss.style.filter = 'brightness(5) saturate(0)';
                    setTimeout(() => boss.style.filter = 'none', 80);

                    missile.remove();
                    clearInterval(checkHit);

                    if (bossHP === 0) {
                        alert('Mission Accomplished!');
                        location.reload();
                    }
                }
            }, 16);

            setTimeout(() => { if (missile.parentNode) missile.remove(); clearInterval(checkHit); }, 1200);
        }
    </script>
</body>
</html>
